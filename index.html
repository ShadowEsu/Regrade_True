<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#dce8ff" />
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('regrade-theme');
          var dark =
            pref === 'dark' ||
            (pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#070b12' : '#dce8ff');
        } catch (e) {}
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Regrade" />
    <meta name="format-detection" content="telephone=no" />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <meta name="description" content="Regrade — upload graded work, analyze your appeal, and draft a professional grade appeal." />
    <link rel="icon" type="image/jpeg" href="/brand/regrade-icon.jpeg" />
    <link rel="apple-touch-icon" href="/brand/regrade-icon.jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Regrade App</title>
  </head>
  <body>
    <div id="root">
      <p class="rg-boot-loading">Loading Regrade…</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
